kind: RegexRule
metadata:
  id: k8s-service-account-token
  name: Kubernetes Service Account Token
  category: cloud
  severity: CRITICAL
  description: Detect Kubernetes Service Account JWT tokens (RS256 signed)
spec:
  pattern: "eyJhbGciOiJSUzI1NiIs[A-Za-z0-9_\\-]+\\.eyJ[A-Za-z0-9_\\-]+\\.[A-Za-z0-9_\\-]+"
