---
kind: RegexRule
metadata:
  id: paypal-client-id
  name: PayPal Client ID
  category: cloud
  severity: CRITICAL
  description: Detects PayPal client IDs
spec:
  pattern: '(?i)(paypal.*clientId|paypal.*client_id)\s*[:=]\s*["'']?(AX[a-zA-Z0-9]{20,})["'']?'
---
kind: RegexRule
metadata:
  id: braintree-merchant-id
  name: Braintree Merchant ID
  category: cloud
  severity: CRITICAL
  description: Detects Braintree merchant IDs
spec:
  pattern: '(?i)(braintree.*merchantId)\s*[:=]\s*["'']?([a-z0-9]{6,16})["'']?'
---
kind: RegexRule
metadata:
  id: braintree-private-key
  name: Braintree Private Key
  category: cloud
  severity: CRITICAL
  description: Detects Braintree private keys
spec:
  pattern: '(?i)(braintree.*privateKey)\s*[:=]\s*["'']?([a-f0-9]{32})["'']?'
