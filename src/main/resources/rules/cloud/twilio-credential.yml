---
kind: RegexRule
metadata:
  id: twilio-account-sid
  name: Twilio Account SID
  category: cloud
  severity: CRITICAL
  description: Detects Twilio Account SID
spec:
  pattern: 'AC[a-z0-9]{32}'
  validator: TwilioCredentialValidator
---
kind: RegexRule
metadata:
  id: twilio-auth-token
  name: Twilio Auth Token
  category: cloud
  severity: CRITICAL
  description: Detects Twilio Auth Token
spec:
  pattern: '(?i)(twilio.*authToken|twilio.*auth_token)\s*[:=]\s*["'']?([a-f0-9]{32})["'']?'
  validator: TwilioCredentialValidator
