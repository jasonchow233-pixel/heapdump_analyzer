---
kind: RegexRule
metadata:
  id: google-service-account-keyid
  name: Google Service Account Private Key ID
  category: cloud
  severity: HIGH
  description: Detects Google Cloud service account private key IDs
spec:
  pattern: '(?i)(privateKeyId|private_key_id)\s*[:=]\s*["'']?([a-f0-9]{40})["'']?'
---
kind: RegexRule
metadata:
  id: google-service-account-email
  name: Google Service Account Client Email
  category: cloud
  severity: HIGH
  description: Detects Google Cloud service account client emails
spec:
  pattern: '(?i)(clientEmail|client_email)\s*[:=]\s*["'']?([a-z0-9-]+@[a-z0-9-]+\.iam\.gserviceaccount\.com)["'']?'
---
kind: RegexRule
metadata:
  id: google-service-account-project
  name: Google Service Account Project ID
  category: cloud
  severity: MEDIUM
  description: Detects Google Cloud service account project IDs
spec:
  pattern: '(?i)(projectId|project_id)\s*[:=]\s*["'']?([a-z0-9-]{6,30})["'']?'
