---
kind: RegexRule
metadata:
  id: okta-domain
  name: Okta Domain
  category: auth
  severity: MEDIUM
  description: Detects Okta domains
spec:
  pattern: '(?i)(okta\.com|okta-emea\.com|oktapreview\.com)'
---
kind: RegexRule
metadata:
  id: okta-api-token
  name: Okta API Token
  category: auth
  severity: CRITICAL
  description: Detects Okta API tokens
spec:
  pattern: '(?i)(okta.*apiToken|okta.*api_token)\s*[:=]\s*["'']?(00[a-zA-Z0-9_-]{30,})["'']?'
---
kind: RegexRule
metadata:
  id: okta-client-secret
  name: Okta Client Secret
  category: auth
  severity: CRITICAL
  description: Detects Okta client secrets
spec:
  pattern: '(?i)(okta.*clientSecret|okta.*client_secret)\s*[:=]\s*["'']?([a-zA-Z0-9_-]{30,})["'']?'
