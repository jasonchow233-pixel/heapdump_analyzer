---
kind: RegexRule
metadata:
  id: auth0-domain
  name: Auth0 Domain
  category: auth
  severity: MEDIUM
  description: Detects Auth0 domains
spec:
  pattern: '(?i)(auth0\.com|eu\.auth0\.com|au\.auth0\.com|jp\.auth0\.com)'
---
kind: RegexRule
metadata:
  id: auth0-client-secret
  name: Auth0 Client Secret
  category: auth
  severity: CRITICAL
  description: Detects Auth0 client secrets
spec:
  pattern: '(?i)(auth0.*clientSecret|auth0.*client_secret)\s*[:=]\s*["'']?([a-zA-Z0-9_-]{40,})["'']?'
---
kind: RegexRule
metadata:
  id: auth0-client-id
  name: Auth0 Client ID
  category: auth
  severity: HIGH
  description: Detects Auth0 client IDs
spec:
  pattern: '(?i)(auth0.*clientId|auth0.*client_id)\s*[:=]\s*["'']?([a-zA-Z0-9]{32})["'']?'
