kind: RegexRule
metadata:
  id: username-password-enhanced
  name: Username and Password Pair
  category: credential
  severity: CRITICAL
  description: Detect username and password pairs in various formats
spec:
  pattern: "(?i)(username|user|login|account|账号|用户名)[\\s]*[=:][\\s]*['\"]?([^\\s<>\"']{3,})['\"]?[\\s,\\n]*(password|passwd|pwd|密码|口令)[\\s]*[=:][\\s]*['\"]?([^\\s<>\"']{6,})['\"]?"