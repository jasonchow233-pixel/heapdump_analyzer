kind: RegexRule
metadata:
  id: username-password-pair
  name: 用户名密码组合
  category: credential
  severity: CRITICAL
  description: 检测用户名和密码成对出现的情况（高危）
spec:
  pattern: "(?i)(username|user|login|账号|用户名)\\s*[=:]\\s*[^\\s<>\"]{3,}.+(password|passwd|pwd|密码|口令)\\s*[=:]\\s*[^\\s<>\"]{6,}"
  useRawMemory: true
  minLength: 20
  maxLength: 500
  contextKeywords:
    - "username"
    - "password"
    - "login"
    - "登录"