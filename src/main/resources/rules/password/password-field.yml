kind: RegexRule
metadata:
  id: password-field
  name: 密码字段
  category: credential
  severity: CRITICAL
  description: 检测密码字段明文存储（高危）
spec:
  pattern: "(?i)(password|passwd|pwd|密码|口令|密钥)\\s*[=:]\\s*[^\\s<>\"]{6,}"
  useRawMemory: true
  minLength: 10
  maxLength: 200
  contextKeywords:
    - "password"
    - "passwd"
    - "pwd"
    - "密码"