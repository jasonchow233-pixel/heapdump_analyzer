kind: RegexRule
metadata:
  id: url-with-credentials
  name: 带凭证的URL
  category: credential
  severity: CRITICAL
  description: 检测URL中包含用户名密码的情况（高危）
spec:
  pattern: "https?://[^:@\\s]+:[^@\\s]+@[^\\s]+"
  useRawMemory: true
  minLength: 15
  maxLength: 500
  contextKeywords:
    - "url"
    - "http"
    - "jdbc"
    - "连接"