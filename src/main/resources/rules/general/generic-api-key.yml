kind: RegexRule
metadata:
  id: generic-api-key
  name: Generic API Key Assignment
  category: general
  severity: HIGH
  description: Detect generic API key/secret assignments in string pool
spec:
  pattern: "(?i)(?:secret[_-]?key|access[_-]?key|api[_-]?key|auth[_-]?token|private[_-]?key)\\s*[=:]\\s*[A-Za-z0-9_\\-/+=]{16,}"
